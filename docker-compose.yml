services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-landlord}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-landlord_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-landlord} -d ${POSTGRES_DB:-landlord_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-32chars}
    ports:
      - "8000:8000"
    volumes:
      - pdf_data:/app/pdf
      # No model-cache volume here on purpose: the embedding/reranker weights and
      # the legal index are baked into the image at build time (see Dockerfile).
      # Mounting an (empty) named volume over /app/.hf_cache would shadow them.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  pdf_data:
