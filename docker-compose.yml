services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-landlord}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-landlord_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-landlord} -d ${POSTGRES_DB:-landlord_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-32chars}
    ports:
      - "8000:8000"
    volumes:
      - pdf_data:/app/pdf
      # Persist the lazily-downloaded embedding/reranker weights and the built
      # legal index across container recreations, so the ~1.5 GB model download
      # for the first legal question happens once ever — not after every deploy.
      - hf_cache:/app/.hf_cache
      - rag_index:/app/rag/.chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  pdf_data:
  hf_cache:
  rag_index:
